applications:
  erp:
    source:
      root: "/backend"

    type: "nodejs:24"

    # Only actual services go here
    relationships:
      database: "postgresql:postgresql"
      cache: "redis:redis"
      queue: "rabbitmq:rabbitmq"
      search: "opensearch:opensearch"
       
    web:
      commands:
        start: "npm start"
      upstream:
        socket_family: tcp
      locations:
        "/":
          passthru: true

    build:
      flavor: none

    hooks:
      build: |
        set -eux
        npm i

services:
  postgresql:
    type: postgresql:18

  redis:
    type: redis:8.0

  opensearch:
    type: opensearch:3

  rabbitmq:
    type: rabbitmq:4.1

  network-storage:
    type: network-storage:1.0

routes:
  "https://{default}/":
    type: upstream
    upstream: "erp:http"

  "https://www.{default}":
    type: redirect
    to: "https://{default}/"

