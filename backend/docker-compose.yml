version: '3.9'

services:
    # ── Express API ──
    api:
        build: .
        container_name: erp-api
        restart: unless-stopped
        ports:
            - '4000:4000'
        env_file: .env
        environment:
            NODE_ENV: production
            MONGO_URI: mongodb://mongo:27017/erp?directConnection=true&replicaSet=rs0
            REDIS_HOST: redis://redis:6379
        depends_on:
            mongo:
                condition: service_healthy
            redis:
                condition: service_healthy
        volumes:
            - uploads_data:/app/uploads

    # ── MongoDB with Replica Set ──
    mongo:
        image: mongo:7
        container_name: erp-mongo
        restart: unless-stopped
        ports:
            - '27017:27017'
        command: ['mongod', '--replSet', 'rs0', '--bind_ip_all']
        volumes:
            - mongo_data:/data/db
        healthcheck:
            test: |
                mongosh --quiet --eval "
                  try {
                    rs.status().ok
                  } catch(e) {
                    rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: 'mongo:27017' }] });
                    1;
                  }
                "
            interval: 10s
            timeout: 10s
            retries: 5
            start_period: 20s

    # ── Redis ──
    redis:
        image: redis:7-alpine
        container_name: erp-redis
        restart: unless-stopped
        ports:
            - '6379:6379'
        volumes:
            - redis_data:/data
        healthcheck:
            test: ['CMD', 'redis-cli', 'ping']
            interval: 10s
            timeout: 5s
            retries: 5

volumes:
    mongo_data:
    redis_data:
    uploads_data:
